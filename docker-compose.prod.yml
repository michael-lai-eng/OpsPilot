# Production compose — runs on Google VM using pre-built GHCR images.
# Do NOT mount source code; images are immutable artifacts from CI.
#
# Required env vars (set in /opt/opspilot/.env on the VM):
#   GHCR_OWNER, SECRET_KEY, POSTGRES_PASSWORD, GITHUB_TOKEN, GITHUB_OWNER

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opspilot
      POSTGRES_USER: opspilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No port binding — only reachable inside Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opspilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/${GHCR_OWNER}/opspilot-backend:${IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: postgresql+asyncpg://opspilot:${POSTGRES_PASSWORD}@postgres:5432/opspilot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_OWNER: ${GITHUB_OWNER}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No external port — nginx proxies /api/ internally
    restart: unless-stopped

  worker:
    image: ghcr.io/${GHCR_OWNER}/opspilot-backend:${IMAGE_TAG:-latest}
    command: celery -A app.workers.task_worker.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://opspilot:${POSTGRES_PASSWORD}@postgres:5432/opspilot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      SECRET_KEY: ${SECRET_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_OWNER: ${GITHUB_OWNER}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  flower:
    image: ghcr.io/${GHCR_OWNER}/opspilot-backend:${IMAGE_TAG:-latest}
    command: celery -A app.workers.task_worker.celery_app flower --port=5555 --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD}
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    ports:
      - "127.0.0.1:5555:5555"  # Only localhost — access via SSH tunnel
    depends_on:
      - redis
      - worker
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GHCR_OWNER}/opspilot-frontend:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

apiVersion: apps/v1
kind: Deployment
metadata:
  name: opspilot-frontend
  namespace: opspilot
  labels:
    app: opspilot-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opspilot-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: opspilot-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/YOUR_ORG/opspilot-frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: opspilot-frontend
  namespace: opspilot
spec:
  selector:
    app: opspilot-frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opspilot-ingress
  namespace: opspilot
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - opspilot.example.com
      secretName: opspilot-tls
  rules:
    - host: opspilot.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: opspilot-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opspilot-frontend
                port:
                  number: 80

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Elasticsearch
    type: elasticsearch
    url: http://elasticsearch:9200
    editable: false
    jsonData:
      index: "opspilot-logs-*"
      timeField: "@timestamp"
      logMessageField: message
      logLevelField: level
